th, td {
    border: 1px solid #ccc;

}

a {
    color: blue;

}

a:hover {
    text-decoration: underline;
}

/* Classe especial para deixar o nome do conjunto na vertical */
.txt-vertical {
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    font-weight: bold;
    font-size: 13px; /* Fonte ligeiramente menor para ajudar a afinar */
    background: #fafafa; 
    padding: 10px 3px; /* Espaço quase zero nas laterais */

    white-space: nowrap; /* Garante que o texto não quebre em várias linhas */
}
</style>
